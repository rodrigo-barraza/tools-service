services:
  tools-service:
    image: tools-service:latest
    container_name: tools-service
    restart: unless-stopped
    ports:
      - "5590:5590"
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /usr/share/zoneinfo/America/Los_Angeles:/etc/localtime:ro
    # Chromium needs larger shared memory in Docker
    shm_size: "256m"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:5590/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
